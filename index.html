<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 校园寻路与失物招领系统</title>
    <style>
        @import url('index.css');
    </style>
</head>
<body>
    <div class="snap_container">
        <!-- 全屏展示区域 -->
        <div class="hero-section">
            <div class="hero-background"></div>
            <canvas class="hero-canvas" id="heroCanvas"></canvas>
        </div>
        <section class="content-section">
            <canvas class="bg-curve-canvas" id="bgCurveCanvas"></canvas>
            <!-- 导航栏 -->
            <nav class="navbar">
                <div class="navbar-title">
                    🏫 <span>校园寻路与失物招领系统</span>
                </div>
                <div id="userInfoContainer" class="user-info">
                    <!-- 用户信息将通过JavaScript动态生成 -->
                </div>
            </nav>
            <!-- 主内容区 -->
            <div class="container">
                <!-- 功能卡片 -->
                <div class="features">
                    <div class="feature-card" onclick="window.location.href='./map.html?mode=view'">
                        <div class="feature-icon">🗺️</div>
                        <h3 class="feature-title">校园寻路</h3>
                        <p class="feature-desc">快速找到校内目的地</p>
                    </div>
                    <div class="feature-card" onclick="window.location.href='./失物招领列表.html'">
                        <div class="feature-icon">📦</div>
                        <h3 class="feature-title">失物招领</h3>
                        <p class="feature-desc">发布/查找失物信息</p>
                    </div>
                </div>
                <!-- 最新失物招领 -->
                <div class="lost-found-section">
                    <h3 class="section-title">📢 <span>最新失物招领</span></h3>
                    <div class="carousel-wrapper" id="carouselWrapper">
                        <button class="carousel-btn prev" id="carouselPrev">◀</button>
                        <div class="carousel-track" id="carouselTrack">
                            <!-- 由JS动态生成 -->
                        </div>
                        <button class="carousel-btn next" id="carouselNext">▶</button>
                    </div>
                    <div class="carousel-dots" id="carouselDots">
                        <!-- 由JS动态生成 -->
                    </div>
                </div>
            </div>
            <h5 class="infoh5">下拉查看更多</h5>
        </section>
        <section id="flow-section">
            <div class="waterflow-section">
                <div class="wf-column" id="wfCol0"></div>
                <div class="wf-column" id="wfCol1"></div>
                <div class="wf-column" id="wfCol2"></div>
            </div>
            <div class="loading-container"></div>
        </section>
    </div>
    <script src="index.js"></script>
    <script>
        
    </script>
</body>
</html>
