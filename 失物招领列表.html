<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>失物招领列表 - 校园寻路与失物招领系统</title>

  <!-- Font Awesome (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #f0f3f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 40px;
    }

    /* 电脑端主容器 — 宽屏卡片 */
    .desktop-container {
      max-width: 1280px;
      width: 100%;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
      padding: 28px 32px 32px;
      transition: all 0.2s;
    }

    /* ===== 顶栏 ===== */
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #1e293b;
      padding: 4px 8px 4px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: all 0.15s ease;
    }

    .back-btn:hover {
      opacity: 1;
      transform: translateX(-2px);
    }

    .back-btn:active {
      transform: translateX(0);
    }

    .nav-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-header h1 i {
      color: #2563eb;
      font-size: 26px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .publish-btn-header {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .publish-btn-header:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
    }

    .publish-btn-header:active {
      transform: scale(0.98);
    }

    .publish-btn-header i {
      font-size: 18px;
    }

    /* ===== 搜索区域 ===== */
    .search-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      max-width: 800px;
    }

    .search-wrapper {
      background: #f1f4f9;
      border-radius: 60px;
      padding: 8px 8px 8px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid #e9edf3;
      transition: 0.2s;
      flex: 1;
    }

    .search-wrapper i {
      color: #64748b;
      font-size: 18px;
    }

    .search-wrapper input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      width: 100%;
      padding: 6px 0;
      color: #1e293b;
    }

    .search-wrapper input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    .search-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .search-btn i {
      font-size: 16px;
    }

    .search-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    .search-btn:active {
      transform: scale(0.98);
    }

    .search-btn-small {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .search-btn-small i {
      font-size: 16px;
    }

    .search-btn-small:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    .search-btn-small:active {
      transform: scale(0.98);
    }

    /* ===== 双栏布局：筛选区 + 列表区 ===== */
    .two-column {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* 左侧筛选面板 */
    .filter-panel {
      flex: 0 0 230px;
      background: #f8fafc;
      border-radius: 28px;
      padding: 18px 16px 22px;
      border: 1px solid #eef2f6;
      position: sticky;
      top: 20px;
    }

    .filter-section {
      margin-bottom: 26px;
    }

    .filter-section:last-child {
      margin-bottom: 0;
    }

    .filter-section-title {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-section-title i {
      color: #64748b;
      font-size: 14px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-btn {
      background: transparent;
      border: none;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      transition: 0.1s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
    }

    .filter-btn:hover {
      background: #f1f5f9;
    }

    .filter-btn i {
      width: 18px;
      font-size: 14px;
      color: #94a3b8;
    }

    .filter-btn.active {
      background: #e0e7ff;
      color: #1d4ed8;
      border-color: #b9c8fa;
      font-weight: 500;
    }

    .filter-btn.active i {
      color: #1d4ed8;
    }

    .filter-btn .badge-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 10px;
      margin-right: 2px;
    }

    .badge-dot.red { background: #dc2626; }
    .badge-dot.green { background: #16a34a; }

    .filter-divider {
      height: 1px;
      background: #e2e8f0;
      margin: 14px 0;
    }

    /* 分类标签 (左侧) */
    .category-tag {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      transition: 0.1s;
    }

    .category-tag:hover {
      background: #f1f5f9;
    }

    .category-tag.active {
      background: #eef2ff;
      color: #1d4ed8;
      border-color: #c7d2fe;
    }

    .category-tag i {
      font-size: 12px;
      color: #94a3b8;
    }

    .category-tag.active i {
      color: #1d4ed8;
    }

    /* 右侧列表区域 */
    .list-area {
      flex: 1;
      min-width: 0;
    }

    /* 卡片列表 (电脑端网格) */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      margin: 6px 0 24px;
    }

    .item-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 18px 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), 0 1px 4px rgba(0, 0, 0, 0.04);
      border: 1px solid #edf2f7;
      display: flex;
      flex-direction: column;
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .item-card:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      border-color: #e0e7ff;
    }

    .card-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .card-img {
      width: 72px;
      height: 72px;
      background: #eef2f6;
      border-radius: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 30px;
      background-image: linear-gradient(145deg, #e9edf3, #f0f4fa);
    }

    .card-content {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 12px;
      border-radius: 40px;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge.lost {
      background: #fee2e2;
      color: #b91c1c;
    }

    .badge.found {
      background: #dcfce7;
      color: #166534;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 16px;
      font-size: 14px;
      color: #475569;
      margin-top: 4px;
    }

    .card-meta i {
      width: 14px;
      color: #64748b;
      font-size: 13px;
      margin-right: 2px;
    }

    .card-meta span {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .card-footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #94a3b8;
    }

    .card-footer i {
      margin-right: 4px;
    }

    /* 分页 (电脑) */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin: 12px 0 8px;
    }

    .pagination button {
      background: #f1f4f9;
      border: none;
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 500;
      color: #1e293b;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      transition: all 0.15s ease;
    }

    .pagination button:hover {
      background: #e2e8f0;
      transform: scale(1.02);
    }

    .pagination button:active {
      transform: scale(0.98);
    }

    .pagination .page-info {
      font-size: 15px;
      color: #475569;
      background: #f8fafc;
      padding: 6px 24px;
      border-radius: 40px;
      border: 1px solid #e9edf3;
    }

    /* 底部微标 */
    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #b9c4d4;
      letter-spacing: 0.4px;
    }

    /* 响应式：小屏电脑/笔记本 */
    @media (max-width: 1024px) {
      body { padding: 24px 20px; }
      .two-column { gap: 20px; }
      .filter-panel { flex: 0 0 200px; }
    }

    @media (max-width: 820px) {
      .two-column { flex-direction: column; }
      .filter-panel {
        flex: 1;
        width: 100%;
        position: static;
        display: flex;
        flex-wrap: wrap;
        gap: 16px 24px;
        padding: 16px 20px;
      }
      .filter-section {
        margin-bottom: 0;
        flex: 1 1 160px;
      }
      .filter-group { flex-direction: row; flex-wrap: wrap; }
      .filter-btn { padding: 6px 14px; }
      .category-tag { padding: 4px 12px; }
      .item-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
      .nav-header { flex-direction: column; align-items: flex-start; }
      .nav-right { width: 100%; }
      .publish-btn-header { width: 100%; justify-content: center; }
      .search-wrapper { max-width: 100%; }
      .search-area { flex-wrap: wrap; max-width: 100%; }
      .search-btn { flex: 1; justify-content: center; }
      .search-btn-small { flex: 1; justify-content: center; }
    }

    @media (max-width: 480px) {
      .item-grid { grid-template-columns: 1fr; }
      .desktop-container { padding: 16px; }
    }

    /* ===== 弹窗样式 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
      animation: modalFadeIn 0.25s ease;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 22px;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-header h2 i {
      color: #2563eb;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #64748b;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: #f1f5f9;
      color: #1e293b;
    }

    .modal-body {
      padding: 24px 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 10px;
    }

    .form-group label i {
      margin-right: 6px;
      color: #64748b;
    }

    /* 类型选择 */
    .type-selector {
      display: flex;
      gap: 12px;
    }

    .type-btn {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      background: white;
      font-size: 15px;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .type-btn:hover {
      border-color: #cbd5e1;
    }

    .type-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .type-btn.lost.active {
      border-color: #dc2626;
      background: #fef2f2;
      color: #b91c1c;
    }

    .type-btn.found.active {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #166534;
    }

    /* 输入框 */
    .form-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: all 0.15s;
      background: #fafafa;
    }

    .form-input:focus {
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder {
      color: #94a3b8;
    }

    /* 分类选择 */
    .category-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .category-option {
      padding: 10px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      background: white;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .category-option:hover {
      border-color: #cbd5e1;
    }

    .category-option.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    /* 描述输入 */
    .form-textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: all 0.15s;
      background: #fafafa;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    .form-textarea:focus {
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* 模态框底部 */
    .modal-footer {
      padding: 20px 28px 24px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 14px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px 24px;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      background: white;
      font-size: 15px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .btn-submit {
      flex: 2;
      padding: 14px 24px;
      border: none;
      border-radius: 40px;
      background: #2563eb;
      font-size: 15px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    /* 成功提示 */
    .success-toast {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: white;
      padding: 16px 32px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(22, 163, 74, 0.3);
      z-index: 1001;
      animation: toastFadeIn 0.3s ease;
    }

    .success-toast.show {
      display: block;
    }

    @keyframes toastFadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ===== 详情弹窗样式 ===== */
    .detail-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .detail-modal-overlay.show {
      display: flex;
    }

    .detail-modal {
      background: #ffffff;
      border-radius: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
      animation: modalFadeIn 0.25s ease;
    }

    .detail-modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .detail-modal-header .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #64748b;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    .detail-modal-header .close-btn:hover {
      background: #f1f5f9;
      color: #1e293b;
    }

    .detail-modal-body {
      padding: 24px 28px;
    }

    .detail-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #e9edf3, #f0f4fa);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
      font-size: 48px;
      margin: 0 auto 24px;
    }

    .detail-title {
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
      text-align: center;

<script>
  let allItems = [];
  const Categories = {'校园卡': 'fa-id-card', '雨伞': 'fa-umbrella', '钥匙': 'fa-key', '手机': 'fa-mobile-alt', '杯子': 'fa-mug-hot', '更多': 'fa-ellipsis-h'};
  let constr = '<button class="category-tag active"><i class="fas fa-check-circle" style="font-size:12px;"></i> 全部</button>';
  let constr2 = '';
  for(let key in Categories) {
    constr += `<button class="category-tag"><i class="fas ${Categories[key]}"></i> ${key}</button>`;
    constr2 += `<button class="category-option" data-category="${key}" data-icon="${Categories[key]}"><i class="fas ${Categories[key]}"></i> ${key}</button>`;
  }
  document.getElementById("category-filter").innerHTML = constr;
  document.getElementById("category-options").innerHTML = constr2;
  let totalItems = 0;

  async function fetchItems(page = 1, filters = {}) {
    try {
      const params = new URLSearchParams();
      
      // 类型筛选
      if (filters.type && filters.type !== '全部') {
        params.append('type', filters.type === '丢失' ? 'LOST' : 'FOUND');
      }
      
      // 分类筛选
      if (filters.category && filters.category !== '全部') {
        params.append('category', filters.category);
      }
      
      // 关键词搜索
      if (filters.keyword) {
        params.append('keyword', filters.keyword);
      }
      
      // 时间筛选
      if (filters.time && filters.time !== '全部') {
        params.append('time', filters.time);
      }
      
      // 分页参数
      params.append('pageNum', page);
      params.append('pageSize', itemsPerPage);

      const url = `http://localhost:8080/api/lostfound/list?${params.toString()}`;
      console.log('请求URL:', url);
      const response = await fetch(url, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json'
        }
      });
      
      const result = await response.json();
      
      if (result.code === 200) {
        const today = new Date();
        const data = result.data.records;

        // 清空现有数据
        allItems = [];
        
        
        data.forEach(item => {
          const category = item.category || '更多';
          if(item.status === 'OPEN') {
          allItems.push({
            id: item.id,
            type: item.type.toLowerCase(),
            title: item.title,
            description: item.description || '',
            category: category,
            icon: Categories[category] || 'fa-ellipsis-h',
            location: item.location || '',
            imageUrls: item.imageUrls || [],
            status: item.status,
            date: formatDate(item.occurred_at || item.occurredAt),
            timeAgo: calculateTimeAgo(item.occurred_at || item.occurredAt),
            author: item.author ? item.author : '未知',
            phone: item.contact || ''
          }); }
        });
        
        totalItems = result.data.total;
        return true;
      } else {
        console.error('获取数据失败:', result.message);
        return false;
      }
    } catch (error) {
      console.error('Error fetching data:', error);
      return false;
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toISOString().split('T')[0];
  }

  function calculateTimeAgo(dateStr) {
    if (!dateStr) return '';
    const today = new Date();
    const date = new Date(dateStr);
    const diffDays = Math.floor((today - date) / (1000 * 60 * 60 * 24));
    
    if (diffDays === 0) return '刚刚';
    if (diffDays === 1) return '昨天';
    if (diffDays < 7) return `${diffDays}天前`;
    if (diffDays < 30) return `${Math.floor(diffDays / 7)}周前`;
    return `${Math.floor(diffDays / 30)}个月前`;
  }

  const itemsPerPage = 9;
  let currentPage = 1;
  let currentFilters = {
    type: '全部',
    category: '全部',
    time: '全部',
    keyword: ''
  };

  // 触发搜索（调用后端API）
  async function triggerSearch() {
    currentPage = 1;
    await fetchItems(1, currentFilters);
    renderItems();
  }

  // 注册事件监听器
  function registerEventListeners() {
    // 筛选按钮点击时触发搜索
    document.querySelectorAll('.filter-section').forEach(section => {
      const buttons = section.querySelectorAll('.filter-btn, .category-tag');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // 更新筛选条件并触发搜索
          const sectionTitle = section.querySelector('.filter-section-title').textContent.trim();
          const filterValue = btn.textContent.trim();
          
          if (sectionTitle === '类型') {
            currentFilters.type = filterValue;
          } else if (sectionTitle === '分类') {
            currentFilters.category = filterValue;
          } else if (sectionTitle === '时间') {
            currentFilters.time = filterValue;
          }
          
          triggerSearch();
        });
      });
    });

    // 搜索按钮点击时执行筛选
    document.querySelector('.search-btn').addEventListener('click', () => {
      const searchInput = document.getElementById('search-input');
      currentFilters.keyword = searchInput.value.trim();
      console.log('当前筛选条件:', currentFilters);
      triggerSearch();
    });

    // 支持回车键搜索
    document.getElementById('search-input').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        document.querySelector('.search-btn').click();
      }
    });

    // 分页按钮事件
    document.querySelector('.pagination button:first-child').addEventListener('click', async () => {
      const totalPages = Math.ceil(totalItems / itemsPerPage);
      if (currentPage > 1) {
        currentPage--;
        await fetchItems(currentPage, currentFilters);
        renderItems();
      }
    });

    document.querySelector('.pagination button:last-child').addEventListener('click', async () => {
      const totalPages = Math.ceil(totalItems / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        await fetchItems(currentPage, currentFilters);
        renderItems();
      }
    });

    // 按钮点击动效
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', function() {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = '';
        }, 100);
      });
    });
  }

  async function GetAllItems() {
    let funcResult = [];
    try {
      const params = new URLSearchParams();
      // 分页参数
      params.append('pageNum', 1);
      params.append('pageSize', 500);

      const url = `http://localhost:8080/api/lostfound/list?${params.toString()}`;
      console.log('请求URL:', url);
      const response = await fetch(url, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json'
        }
      });
      
      const result = await response.json();
      
      if (result.code === 200) {
        const today = new Date();
        const data = result.data.records;

        data.forEach(item => {
          const category = item.category || '更多';
          if(item.status === 'OPEN') {
          funcResult.push({
            id: item.id,
            type: item.type.toLowerCase(),
            title: item.title,
            description: item.description || '',
            category: category,
            icon: Categories[category] || 'fa-ellipsis-h',
            location: item.location || '',
            imageUrls: item.imageUrls || [],
            status: item.status,
            date: formatDate(item.occurred_at || item.occurredAt),
            timeAgo: calculateTimeAgo(item.occurred_at || item.occurredAt),
            author: item.author ? item.author : '未知',
            phone: item.contact || ''
          }); }
        });
        return funcResult;
      } else {
        console.error('获取数据失败:', result.message);
        return [];
      }
    } catch (error) {
      console.error('Error fetching data:', error);
      return [];
    }
  }

  window.onload = async function() {
    registerEventListeners();
    await fetchItems(1, currentFilters);
    renderItems();
    try {
      let id = parseInt(new URLSearchParams(window.location.search).get('id',-1));
      if(id !== -1) {
        const item = (await GetAllItems()).find(i => i.id === id);
        if(item) openItem(item);
      }
    } catch(e) {}
  }
  function createCard(item) {
    const badgeClass = item.type === 'lost' ? 'badge lost' : 'badge found';
    const badgeText = item.type === 'lost' ? '丢失' : '捡到';
    // 处理地点显示
    let displayLocation;
    try {
      const parsedLocation = JSON.parse(item.location);
      if(parsedLocation[0] !== undefined) {
        displayLocation = (typeof (parsedLocation[0]) === 'string' ? parsedLocation[0] : '特定') + ' ' + parsedLocation[1];
      } else
        displayLocation = item.location;
    } catch (e) {
      displayLocation = item.location;
    }
    
    return `
      <div class="item-card" data-id="${item.id}" data-type="${item.type}" data-category="${item.category}">
        <div class="card-top">
          <div class="card-img"><i class="fas ${item.icon}"></i></div>
          <div class="card-content">
            <div class="card-title">
              ${item.title}
              <span class="${badgeClass}"><i class="fas fa-circle" style="font-size: 8px;"></i> ${badgeText}</span>
            </div>
            <div class="card-meta">
              <span><i class="fas fa-map-pin"></i> ${displayLocation}</span>
              <span><i class="far fa-calendar-alt"></i> ${item.date}</span>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <span><i class="far fa-clock"></i> ${item.timeAgo}</span>
          <span><i class="far fa-user-circle"></i> ${item.author}</span>
        </div>
      </div>
    `;
  }

  function renderItems() {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    
    const itemGrid = document.querySelector('.item-grid');
    const pageInfo = document.querySelector('.pagination .page-info');
    
    if (allItems.length === 0) {
      itemGrid.innerHTML = '<div style="text-align: center; padding: 40px; color: #94a3b8;">暂无符合条件的记录</div>';
    } else {
      itemGrid.innerHTML = allItems.map(createCard).join('');
    }
    
    pageInfo.textContent = `第${currentPage}页 / 共${totalPages}页`;
    
    // 更新分页按钮状态
    const prevBtn = document.querySelector('.pagination button:first-child');
    const nextBtn = document.querySelector('.pagination button:last-child');
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage >= totalPages;
    if (currentPage === 1) prevBtn.style.opacity = '0.5';
    else prevBtn.style.opacity = '1';
    if (currentPage >= totalPages) nextBtn.style.opacity = '0.5';
    else nextBtn.style.opacity = '1';
  }

  // ===== 发布功能 =====
  const modalOverlay = document.getElementById('publish-modal');
  const modalClose = document.getElementById('modal-close');
  const btnCancel = document.getElementById('btn-cancel');
  const btnSubmit = document.getElementById('btn-submit');
  const publishBtn = document.querySelector('.publish-btn-header');
  const successToast = document.getElementById('success-toast');
  
  // 地点选择功能
  const locationDetail = document.getElementById('item-location-detail');
  const locationInput = document.getElementById('item-location');
  const selectLocationBtn = document.getElementById('select-location-btn');

  selectLocationBtn.addEventListener('click', () => {
    window.localStorage.Map_selected = null;
    // 打开地图选择窗口
    const mapWindow = window.open('./map.html?mode=select', '_blank', `width=${window.innerWidth},height=${window.innerHeight}`);
    
    // 监听窗口关闭事件
    const checkWindowClosed = setInterval(() => {
      if (mapWindow && mapWindow.closed) {
        clearInterval(checkWindowClosed);
        
        // 尝试从localStorage中读取地点
        try {
          if (window.localStorage && window.localStorage.Map_selected) {
            const rawLocation = window.localStorage.Map_selected;
            locationInput.value = rawLocation;
            
            let displayLocation;
            try {
              const parsedLocation = JSON.parse(rawLocation);
              displayLocation = typeof parsedLocation === 'string' ? parsedLocation : '特定';
            } catch (e) {
              // 如果解析失败，直接使用原始值
              displayLocation = rawLocation;
            }
            selectLocationBtn.innerHTML = '<i class="fas fa-map-marker-alt"></i> '+displayLocation;
          }
        } catch (e) {
          console.error('读取地点数据失败:', e);
        }
      }
    }, 100);
  });


  // 打开模态框
  publishBtn.addEventListener('click', () => {
    if(!localStorage.userInfo) {
      window.location.href = './login.html';
      return;
    }
    modalOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    // 默认选中"丢失"类型
    document.getElementById('type-lost').click();
    document.getElementById('item-date').value = (new Date()).toISOString().substr(0,10);
    let lui = JSON.parse(localStorage.userInfo);
    document.getElementById('item-author').value = lui.username[0] + '同学';
  });

  // 关闭模态框
  function closeModal() {
    modalOverlay.classList.remove('show');
    document.body.style.overflow = '';
    // 重置表单
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.category-option').forEach(btn => btn.classList.remove('active'));
    document.getElementById('item-title').value = '';
    locationInput.value = '';
    document.getElementById('item-description').value = '';
    selectLocationBtn.innerHTML = '<i class="fas fa-map-marker-alt"></i> 选择地点';
    locationDetail.value = '';
  }

  modalClose.addEventListener('click', closeModal);
  btnCancel.addEventListener('click', closeModal);

  // 点击遮罩关闭
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) {
      closeModal();
    }
  });

  // 类型选择
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 分类选择
  document.querySelectorAll('.category-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.category-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 表单提交
  btnSubmit.addEventListener('click', async () => {
    // 获取表单数据
    const typeBtn = document.querySelector('.type-btn.active');
    const categoryBtn = document.querySelector('.category-option.active');
    
    const itemType = typeBtn.classList.contains('lost') ? 'LOST' : 'FOUND';
    const title = document.getElementById('item-title').value.trim();
    const category = categoryBtn ? categoryBtn.dataset.category : '更多';
    const icon = categoryBtn ? categoryBtn.dataset.icon : 'fa-ellipsis-h';
    
    // 处理地点：location为文字描述
    let parsedstr = '';
    let Composedlocation = '';
    try {
      parsedstr = JSON.parse(locationInput.value);
    } catch (e) {
      parsedstr = '';
    }

    Composedlocation = JSON.stringify([parsedstr, locationDetail.value.trim()]);
    
    const occurredAt = document.getElementById('item-date').value;
    const contact = document.getElementById('item-phone').value.trim();
    const description = document.getElementById('item-description').value.trim();
    const author = document.getElementById('item-author').value.trim();

    // 验证必填字段
    if (!title) {
      alert('请输入物品名称');
      return;
    }
    if (title.length < 2 || title.length > 200) {
      alert('标题长度需在2-200字符之间');
      return;
    }
    if (!categoryBtn) {
      alert('请选择物品分类');
      return;
    }
    if (!contact) {
      alert('请输入联系方式');
      return;
    }

    let lui = JSON.parse(localStorage.userInfo);
    // 构建请求体
    const requestBody = {
      type: itemType,
      title: title,
      description: description,
      category: category,
      location: Composedlocation,
      contact: contact,
      occurredAt: occurredAt,
      author: author,
      userId: lui.id,
      username: lui.username,
      avatar: lui.avatarUrl || ""
    };

    try {
      // 从localStorage获取token
      const token = window.localStorage.getItem('authToken');
      
      // 发送POST请求
      const response = await fetch('http://localhost:8080/api/lostfound/publish', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(requestBody)
      });

      const result = await response.json();

      if (result.code === 200) {
        // 获取当前时间
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        let timeAgo = '';
        
        if (occurredAt === today) {
          timeAgo = '刚刚';
        } else {
          const dateObj = new Date(occurredAt);
          const diffDays = Math.floor((now - dateObj) / (1000 * 60 * 60 * 24));
          if (diffDays === 1) {
            timeAgo = '昨天';
          } else if (diffDays < 7) {
            timeAgo = `${diffDays}天前`;
          } else if (diffDays < 30) {
            timeAgo = `${Math.floor(diffDays / 7)}周前`;
          } else {
            timeAgo = `${Math.floor(diffDays / 30)}个月前`;
          }
        }

        // 关闭模态框
        closeModal();
        
        // 显示成功提示
        successToast.classList.add('show');
        setTimeout(() => {
          successToast.classList.remove('show');
        }, 2000);
        
        // 重新从后端获取数据，刷新列表
        await triggerSearch();
      } else {
        alert(result.message || '发布失败，请重试');
      }
    } catch (error) {
      console.error('发布失败:', error);
      alert('发布失败，请检查网络连接');
    }
  });

  // ===== 详情弹窗功能 =====
  const detailModalOverlay = document.getElementById('detail-modal');
  const detailClose = document.getElementById('detail-close');
  const detailCloseBtn = document.getElementById('detail-close-btn');
  const detailContactBtn = document.getElementById('detail-contact-btn');

  // 关闭详情弹窗
  function closeDetailModal() {
    detailModalOverlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  detailClose.addEventListener('click', closeDetailModal);
  detailCloseBtn.addEventListener('click', closeDetailModal);

  // 点击遮罩关闭
  detailModalOverlay.addEventListener('click', (e) => {
    if (e.target === detailModalOverlay) {
      closeDetailModal();
    }
  });
  document.querySelector('.back-btn').addEventListener('click', () => {
    setTimeout(() => {
          window.location.href = './index.html';
        }, 200);
  });

  function openItem(item) {
    // 填充详情内容
    document.getElementById('detail-icon').innerHTML = `<i class="fas ${item.icon}"></i>`;
    document.getElementById('detail-title-text').textContent = item.title;
    
    // 设置状态标签
    const badge = document.getElementById('detail-badge');
    if (item.type === 'lost') {
      badge.className = 'detail-badge lost';
      badge.innerHTML = '<i class="fas fa-circle" style="font-size: 10px;"></i> 丢失';
    } else {
      badge.className = 'detail-badge found';
      badge.innerHTML = '<i class="fas fa-circle" style="font-size: 10px;"></i> 捡到';
    }
    
    // 处理地点显示
    let displayLocation, NavigationElement = '';
    try {
      const parsedLocation = JSON.parse(item.location);
      if(parsedLocation[0] !== undefined) {
        displayLocation = (typeof (parsedLocation[0]) === 'string' ? parsedLocation[0] : '特定') + ' ' + parsedLocation[1];
        if(parsedLocation[0] !== '') {
          let param1 = './map.html?mode=view&'+new URLSearchParams({'selected':JSON.stringify(parsedLocation[0])}).toString();
          let param2 = '_blank';
          let param3 = `width=${window.innerWidth},height=${window.innerHeight}`
          NavigationElement = `
            <button type="button" class="search-btn-small" style="flex: none; padding: 7px 10px;" onclick="${'window.open(\''+param1+'\', \''+param2+'\', \''+param3+'\')'}">
              <i class="fas fa-map-marker-alt"></i> 导航
            </button>
          `;
        }
      } else
        displayLocation = item.location;
    } catch (e) {
      console.error(e);
      displayLocation = item.location;
    }

    document.getElementById('detail-location').innerHTML = displayLocation + NavigationElement;
    document.getElementById('detail-date').textContent = item.date;
    document.getElementById('detail-time').textContent = item.timeAgo;
    document.getElementById('detail-author').textContent = item.author;
    
    // 显示联系方式（无则显示"无"）
    document.getElementById('detail-phone').textContent = item.phone && item.phone.trim() ? item.phone : '无';
    
    // 显示物品描述（无则显示"无"）
    document.getElementById('detail-description').textContent = item.description && item.description.trim() ? item.description : '无';
    
    // 打开弹窗
    detailModalOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  // 点击卡片显示详情
  document.addEventListener('click', (e) => {
    const itemCard = e.target.closest('.item-card');
    if (itemCard) {
      const itemId = parseInt(itemCard.dataset.id);
      const item = allItems.find(i => i.id === itemId);
      if (item) openItem(item);
    }
  });

  // 联系按钮
  detailContactBtn.addEventListener('click', () => {
    const contact = document.getElementById('detail-phone').textContent;
    alert(`联系方式：${contact}`);
  });
</script>
</body>
</html>
