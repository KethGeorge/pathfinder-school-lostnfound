server:
  port: 8080

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# 日志：同时输出到控制台和文件 logs/campus.log
logging:
  file:
    name: logs/campus.log
  level:
    com.campus: info
    com.campus.module.*.mapper: warn   # 关掉 SQL 明细，如需调试改成 debug
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

# JWT 配置
jwt:
  secret: campus-system-jwt-secret-key-2024-very-long-string-for-hs256
  expiration: 86400000    # 24小时，单位毫秒
